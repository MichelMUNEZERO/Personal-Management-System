name: SLSA Provenance
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare artifacts
        run: |
          cd build
          tar czf ../pms-build.tar.gz .
          cd ..

      - name: Generate subject for provenance
        id: hash
        run: |
          set -euo pipefail
          sha256sum pms-build.tar.gz | base64 -w0 > "${GITHUB_OUTPUT}"
          echo "hashes=$(cat ${GITHUB_OUTPUT})" >> "${GITHUB_OUTPUT}"

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.4.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true
